<head>

  <title>鲤礼星｜一颗只为你点亮的星</title>
  <meta name="description" content="2026年7月14日，一颗名为鲤礼的星，第一次照进了我的宇宙。" />
  <style>
    :root{--night:#020713;--blue:#06162d;--gold:#e7c987;--gold2:#f5e7bd;--ivory:#f6f2e9}
    *{box-sizing:border-box}html,body{min-height:100%;margin:0;background:var(--night)}
    body{color:var(--ivory);font-family:"Songti SC","STSong","Noto Serif SC",serif}
    button{border:0;color:inherit;font:inherit}
    .page{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:28px 22px;background:radial-gradient(circle at 50% 42%,rgba(20,60,105,.22),transparent 35%),linear-gradient(150deg,#020611,#041127 52%,#020713);transition:background 1s ease}
    .page.revealed{background:radial-gradient(circle at 50% 39%,rgba(47,89,137,.28),transparent 38%),linear-gradient(150deg,#020611,#05162f 52%,#020713)}
    .page.letter{overflow-y:auto;background:radial-gradient(circle at 50% 12%,rgba(34,75,124,.18),transparent 34%),linear-gradient(160deg,#020611,#051329 56%,#020713)}
    .depth{position:absolute;z-index:-3;border-radius:50%;filter:blur(80px);pointer-events:none}.d1{width:42vw;height:42vw;top:12%;right:-18%;background:rgba(29,75,128,.13)}.d2{width:34vw;height:34vw;bottom:-12%;left:-14%;background:rgba(131,103,54,.065)}
    #stars{position:absolute;inset:0;z-index:-1;pointer-events:none}.dot{position:absolute;display:block;border-radius:50%;background:#fff8df;box-shadow:0 0 7px rgba(231,201,135,.55);animation:twinkle ease-in-out infinite alternate}
    .mark{display:flex;align-items:center;justify-content:center;gap:13px;min-height:18px;color:rgba(238,226,194,.58);font-family:Arial,sans-serif;font-size:9px;font-weight:500;letter-spacing:.28em}.mark i{width:3px;height:3px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(231,201,135,.7)}
    .experience{min-height:0;display:grid;place-items:center}.scene{width:min(100%,560px);text-align:center;animation:enter 1s cubic-bezier(.22,1,.36,1) both}
    .eyebrow{margin:0 0 20px;color:rgba(231,201,135,.66);font:500 8px Arial,sans-serif;letter-spacing:.42em}.intro-title{margin:0 0 14px;color:rgba(246,242,233,.78);font-size:clamp(17px,4.6vw,23px);font-weight:400;line-height:1.75;letter-spacing:.14em}.intro-title span{display:block;color:var(--gold2)}
    .star-stage{position:relative;width:clamp(166px,43vw,236px);aspect-ratio:1;display:grid;place-items:center;margin:0 auto}.star-button{padding:0;cursor:pointer;appearance:none;background:transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.star-button:focus-visible{outline:1px solid rgba(231,201,135,.62);outline-offset:8px;border-radius:50%}
    .orbit,.halo,.flare,.core,.reflection{position:absolute;display:block;pointer-events:none}.orbit{border:1px solid rgba(231,201,135,.12);border-radius:50%}.o1{inset:5%;animation:orbit 16s linear infinite}.o1:after{content:"";position:absolute;width:4px;height:4px;top:14%;left:14%;border-radius:50%;background:var(--gold2);box-shadow:0 0 10px rgba(231,201,135,.8)}.o2{inset:18%;border-color:rgba(231,201,135,.08);border-style:dashed;animation:orbit 22s linear infinite reverse}
    .halo{width:44%;height:44%;border-radius:50%;background:radial-gradient(circle,rgba(255,241,196,.36),rgba(231,201,135,.09) 34%,transparent 72%);filter:blur(7px);animation:halo 3.6s ease-in-out infinite}.core{width:12px;height:12px;border-radius:50%;background:#fff9e5;box-shadow:0 0 7px #fff8d8,0 0 18px rgba(245,220,151,.95),0 0 46px rgba(231,201,135,.58),0 0 94px rgba(113,167,215,.22);animation:core 3.6s ease-in-out infinite}.flare{left:50%;top:50%;width:54%;height:1px;transform:translate(-50%,-50%);background:linear-gradient(90deg,transparent,rgba(255,241,196,.68),transparent);opacity:.62}.flare.v{width:42%;transform:translate(-50%,-50%) rotate(90deg);opacity:.38}.reflection{width:70%;height:24%;border-radius:50%;border-bottom:1px solid rgba(231,201,135,.06);transform:rotate(-18deg)}
    .touch{display:inline-flex;align-items:center;gap:10px;margin-top:14px;padding:10px 14px;color:rgba(246,242,233,.52);background:transparent;font-size:11px;letter-spacing:.24em;cursor:pointer}.touch i{width:4px;height:4px;border-radius:50%;background:var(--gold);box-shadow:0 0 9px var(--gold);animation:pulse 1.8s ease-in-out infinite}
    .revealed-star{width:clamp(145px,38vw,205px);animation:arrive 1.3s cubic-bezier(.18,.89,.32,1.15) both}.reveal-eye{margin-bottom:4px}.copy{margin-top:-4px;animation:rise .9s .5s both}.discovery{margin:0 0 9px;color:rgba(246,242,233,.59);font-size:clamp(12px,3.2vw,15px);letter-spacing:.11em}.copy h1{margin:0;color:var(--gold2);font-size:clamp(38px,10vw,61px);font-weight:400;letter-spacing:.16em;text-indent:.16em;text-shadow:0 0 28px rgba(231,201,135,.18)}.subtitle{margin:10px 0 0;color:rgba(246,242,233,.42);font-size:12px;letter-spacing:.15em}
    .record{display:flex;align-items:center;justify-content:center;gap:clamp(22px,8vw,44px);margin-top:24px;animation:rise .8s .75s both}.record>span{display:flex;min-width:86px;flex-direction:column;gap:5px}.record small{color:rgba(246,242,233,.34);font-size:9px;letter-spacing:.18em}.record strong{color:rgba(246,242,233,.72);font:400 11px Arial,sans-serif;letter-spacing:.1em}.record>i{width:1px;height:28px;background:linear-gradient(transparent,rgba(231,201,135,.27),transparent)}
    .gold-btn{display:inline-flex;align-items:center;justify-content:center;gap:18px;min-width:176px;margin-top:26px;padding:13px 24px;border:1px solid rgba(231,201,135,.34);border-radius:999px;color:rgba(245,231,189,.88);background:linear-gradient(120deg,rgba(231,201,135,.055),rgba(231,201,135,.015));font-size:12px;letter-spacing:.18em;cursor:pointer;animation:rise .8s .95s both}.gold-btn:active{transform:scale(.98)}
    .letter-scene{max-width:500px;padding:24px 0 16px}.letter-star{position:relative;width:74px;height:32px;margin:0 auto 10px}.letter-star:before,.letter-star:after{content:"";position:absolute;left:50%;top:50%;background:linear-gradient(90deg,transparent,rgba(231,201,135,.45),transparent);transform:translate(-50%,-50%)}.letter-star:before{width:74px;height:1px}.letter-star:after{width:34px;height:1px;transform:translate(-50%,-50%) rotate(90deg)}.letter-star i{position:absolute;z-index:1;left:50%;top:50%;width:6px;height:6px;border-radius:50%;background:#fff8df;box-shadow:0 0 8px #fff0bd,0 0 22px rgba(231,201,135,.72);transform:translate(-50%,-50%)}
    .letter-kicker{margin:0 0 10px;color:rgba(231,201,135,.56);font:400 8px Arial,sans-serif;letter-spacing:.4em}.letter-scene h1{margin:0;color:var(--gold2);font-size:clamp(25px,6.7vw,36px);font-weight:400;letter-spacing:.12em;text-indent:.12em}.letter-copy{margin-top:26px;color:rgba(246,242,233,.72);font-size:clamp(13px,3.4vw,16px);line-height:2;letter-spacing:.1em}.letter-copy p{margin:0 0 18px;animation:rise .9s both}.letter-copy p:nth-child(1){animation-delay:.25s}.letter-copy p:nth-child(2){animation-delay:.45s}.letter-copy p:nth-child(4){animation-delay:.75s}.letter-copy p:nth-child(5){animation-delay:1s}.date{color:rgba(231,201,135,.58);font:400 10px Arial,sans-serif;letter-spacing:.2em}.divider{display:block;width:28px;height:1px;margin:2px auto 18px;background:rgba(231,201,135,.3)}.promise{color:rgba(245,231,189,.9)}
    .signature{display:flex;flex-direction:column;align-items:flex-end;width:min(80%,330px);margin:0 auto;color:rgba(246,242,233,.6);animation:rise .9s 1.2s both}.signature span{font-size:11px;letter-spacing:.12em}.signature strong{margin-top:5px;color:var(--gold2);font-size:18px;font-weight:400;letter-spacing:.18em}.replay{display:inline-flex;align-items:center;gap:9px;margin-top:28px;padding:9px 14px;color:rgba(246,242,233,.35);background:transparent;font-size:10px;letter-spacing:.16em;cursor:pointer;animation:rise .8s 1.45s both}.replay i{width:4px;height:4px;border:1px solid rgba(231,201,135,.48);border-radius:50%}
    .first{display:flex;flex-direction:column;align-items:center;gap:6px;min-height:32px;color:rgba(246,242,233,.39);font-family:Arial,sans-serif}.first span{color:rgba(231,201,135,.47);font-size:7px;letter-spacing:.38em}.first strong{font-size:10px;font-weight:400;letter-spacing:.16em}.letter .first{visibility:hidden;min-height:0}
    .music-toggle{position:fixed;z-index:5;top:max(22px,env(safe-area-inset-top));right:20px;width:34px;height:34px;padding:0;border:1px solid rgba(231,201,135,.22);border-radius:50%;color:rgba(245,231,189,.72);background:rgba(3,12,27,.42);box-shadow:0 0 18px rgba(231,201,135,.05);font:400 15px Georgia,serif;opacity:0;pointer-events:none;cursor:pointer;backdrop-filter:blur(8px);transition:opacity .6s ease,border-color .3s ease}.music-toggle.show{opacity:.72;pointer-events:auto}.music-toggle:focus-visible{outline:1px solid rgba(231,201,135,.7);outline-offset:4px}.music-toggle.muted{color:rgba(246,242,233,.3);border-color:rgba(246,242,233,.12)}.music-toggle.muted:after{content:"";position:absolute;left:8px;top:16px;width:18px;height:1px;background:rgba(246,242,233,.34);transform:rotate(-45deg)}
    @keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes twinkle{from{transform:scale(.72);filter:brightness(.76)}to{transform:scale(1.18);filter:brightness(1.28)}}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes halo{0%,100%{transform:scale(.84);opacity:.58}50%{transform:scale(1.18);opacity:1}}@keyframes core{0%,100%{transform:scale(.88);filter:brightness(.92)}50%{transform:scale(1.12);filter:brightness(1.14)}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}@keyframes arrive{from{opacity:0;transform:scale(.46);filter:brightness(2)}to{opacity:1;transform:scale(1);filter:brightness(1)}}
    @media(max-height:720px){.page{padding-top:20px;padding-bottom:18px}.intro-title{margin-bottom:6px;line-height:1.58}.intro .star-stage{width:142px}.touch{margin-top:4px}.revealed-star{width:126px}.record{margin-top:14px}.gold-btn{margin-top:16px;padding-top:11px;padding-bottom:11px}.letter-scene{padding-top:12px}.letter-copy{margin-top:15px;line-height:1.8}.letter-copy p{margin-bottom:11px}.divider{margin-bottom:11px}.replay{margin-top:16px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-delay:0ms!important;animation-iteration-count:1!important}}
  </style>

    for(let i=0;i<96;i++){const s=document.createElement('i');s.className='dot';const size=i%13===0?2.2:i%5===0?1.4:.8;s.style.cssText=`left:${(i*47.31+7)%100}%;top:${(i*31.73+3)%100}%;width:${size}px;height:${size}px;animation-delay:${(i%17)*-.37}s;animation-duration:${3.8+(i%9)*.42}s;opacity:${.25+(i%7)*.08}`;stars.appendChild(s)}

    function startMusic(){try{if(!musicStarted){musicStarted=true;musicOn=true;bgm.volume=.58;bgm.currentTime=0;const attempt=bgm.play();if(attempt)attempt.catch(()=>{musicOn=false;updateMusicButton()})}updateMusicButton()}catch(e){musicOn=false;updateMusicButton()}}
    function updateMusicButton(){musicButton.classList.toggle('show',musicStarted);musicButton.classList.toggle('muted',!musicOn);musicButton.setAttribute('aria-pressed',String(musicOn));musicButton.setAttribute('aria-label',musicOn?'关闭背景音乐':'打开背景音乐')}

    function letter(){page.className='page letter';exp.innerHTML=`<article class="scene letter-scene"><div class="letter-star"><i></i></div><p class="letter-kicker">TO MY DEAREST LI LI</p><h1>鲤礼（我的媳妇）</h1><div class="letter-copy"><p class="date">2026年7月14日</p><p>一颗名为“鲤礼”的星，<br>第一次照进了我的宇宙。</p><span class="divider"></span><p>从那天起，<br>星星不再只是星星，<br>而是每一次抬头时，<br>我都会想起的人。</p><p class="promise">鲤礼，我想陪你把以后的日子，<br>一天一天，过成属于我们的星河。</p></div><div class="signature"><span>爱你的老公</span><strong>建廷</strong></div><button class="replay" id="replay"><i></i>再看一次</button></article>`;document.getElementById('replay').onclick=showIntro;window.scrollTo(0,0)}
